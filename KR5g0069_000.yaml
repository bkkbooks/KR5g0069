body:
  text: 三要達道篇夫氣受於沖和形成於天地妙用藏於不測真元散乎有作是以茫茫之説若嘉苗而不秀韱韱之論若顛木之不芽其大道嘗病乎不知以為知不損以為損而人視之常若千里之遠矣今修行人當去慮忘思絶塵拂愛試聽吾一説焉吾嘗讀陰符經云九竅之邪在乎三要吾謂知其本矣且誘人之真亂人之神使內觀不明慧照不清者五色也而目力常與之爭焉去人之靈遺人之清而使天鼓不鳴希音不亮者五聲也而耳力常與之較焉一失為榮辱之機一出為善惡之原而是非之由發乎此者言也而口常與之辨焉目焉而與五色爭耳焉而與五聲較口焉而與一切言辨目由是而盲耳由是而聾口由是而訥則真元不存而九邪自此而起焉欲養道者欲去九邪先正三要莫若非禮勿視非禮勿聽非禮勿言顔淵為仁尚慎乎此況養道乎常蔽其目而無色塞其耳而無聲緘其口而無言無色非直無色也無其色色而已若視之以禮何必蔽焉無聲非直無聲也無其聲聲而已若聽之以道何必塞焉無言非直無言也無其言言而已若語之以典何必緘焉視之以禮則五色不為其亂而無眼罪矣聽之以道則五聲不為其淫而無耳罪矣語之以典則一切言不為其愆而無口過矣如是則法眼無不見法聽無不聞法言無不辨而大道常在乎己而物不能漬之今人學道未絶三要以求超真必未之知也吾因議道將此一説幸為衆審以為道用期出世之妙果爾三要達道篇
